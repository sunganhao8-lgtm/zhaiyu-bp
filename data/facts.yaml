# ============================================
# 宅域 (Zhaiyu) — 项目事实库（唯一数据源）
# 所有文档中的数字/事实必须与此保持一致
# 修改此文件后运行 tools/verify.py 校验
# ============================================
project:
  name: 宅域
  english_name: Zhaiyu
  tagline: "服务破冰 · 客户发言档案 · 家庭需求产品化"
  founded: 2026-06-16
  latest_revision: 2026-07-01  # 基于客户发言档案、信任锚点和投资人话术修订
  core_goal: >
    宅域的核心目标不是同时做很多业务，而是用可信服务破冰，
    把每一位客户的发言、抱怨、偏好、预算和生活场景沉淀为"客户发言档案"，
    再从档案中提炼可复制的家庭需求方案、产品和长期复购。

# ── 启动资金 ──
startup:
  total: 120000  # 总启动资金 12万（3人出资，创始人A+创始人B+创始人C）
  version: "2026-06-26 会议最终确认"
  notes: >
    Excel 中另有 13.5 万版（含店长D出资 6750），
    会议最终确认的版本为 12 万，店长D以人力股 5% 方式进入。

shareholders:
  - name: 创始人A
    role: 运营与谈判
    investment: 51000
    equity: 0.425
    equity_gifted: -0.025  # 赠送店长D
    notes: 创始人，主抓运营与商务谈判
  - name: 创始人B
    role: 财务与质量
    investment: 39000
    equity: 0.31
    equity_gifted: -0.015
  - name: 创始人C
    role: 技术与项目管理
    investment: 30000
    equity: 0.24
    equity_gifted: -0.01
  - name: 店长D
    role: 人力股（店内运营）
    investment: 0
    equity: 0.05  # 从三位原始股东各让渡部分获得

# ── 成本结构（月） ──
costs:
  monthly_fixed: 9850     # 月固定成本合计
  rent: 8000               # 房租压力测试口径；若最终年租8万，差额进入安全边际
  deposit: 8000            # 押金（一次性，不摊销）
  utilities: 500           # 水电气（商用预估）
  misc: 1350               # 杂项（物业/耗材/推广）
  daily_fixed: 328         # 日固定成本（9850/30）

# ── 营收模型 ──
revenue:
  daily_target: 750        # 日经营贡献目标（原表按"单价纯利润"口径）
  daily_forecast: 699.5    # 当前预测日经营贡献
  daily_gap: 50.5          # 差距（需补足）
  breakeven_months: 12     # 目标回本周期
  annual_net_profit_forecast: 135476  # 年净利润预测（Excel计算值，需验证）
  note: >
    成本收益表右侧业务区使用"单价纯利润"字段，
    因此 699.5/750 更接近日经营贡献目标，而不是严格营业收入。
    对外表达时应区分流水、毛利、抽成后贡献和净利润。

# ── 业务组合策略 ──
strategy:
  positioning: >
    首期不是单纯宠物店，也不是收费电竞房，更不是无边界的大杂烩。
    宅域定位为"可信服务入口 + 客户发言档案 + 家庭需求产品化系统"：
    宠物洗护承担稳定现金流和高频破冰，电竞样板间承担理想居住环境的可视化表达，
    自媒体矩阵承担需求测试和低成本获客，所有新业务必须从客户真实发言中验证后再进入模型。
  phase_1_focus:
    - 宠物洗护
    - 美容造型
    - 基础寄养
    - 宠物用品零售
    - 电竞房样板间展示
    - 上门桌搭/电竞房搭建
  phase_1_not_focus:
    - 疫苗注射
    - 宠物诊疗
    - 酒馆
    - 减脂餐
    - 学生自习收费
    - 远程喂猫直播
  gaming_showroom:
    role: "样板间 + 内容拍摄点 + 高客单转化入口"
    not_role: "独立收费电竞房或游戏厅"
    revenue_logic: >
      不按每天固定散客流水计算，而按内容曝光、咨询、到店看样板、
      上门方案成交、周边带货的漏斗转化计算。
    first_products:
      - "99-199 元：桌搭诊断/方案，可抵扣后续服务"
      - "399-699 元：基础理线、灯光、支架、插排改造"
      - "999-2999 元：大屏、投影、音响、桌搭整套搭建"
      - "低库存周边：灯带、支架、理线槽、插排、氛围灯"

# ── 客户发言档案系统 ──
customer_insight:
  thesis: >
    每一位客户的发言都是宅域洞察家庭需求的原材料。
    服务不是终点，而是破开陌生客户防备的入口；真正的转化来自倾听、记录、复盘和产品化。
  archive_fields:
    - 基础画像：客户住区、家庭结构、宠物情况、租房/自住房、预算区间
    - 原话记录：客户抱怨、犹豫、偏好、反复提到的麻烦
    - 场景问题：洗护、喂养、清洁、桌搭、收纳、智能设备、维修安装等具体场景
    - 解决过程：本次服务做了什么、客户为什么满意或不满意
    - 后续机会：可转化的产品、套餐、上门服务、内容选题、复购提醒
  operating_loop:
    - "服务破冰：用洗护、接送、桌搭诊断等低门槛服务建立第一次信任"
    - "发言入库：把客户原话按场景、痛点、预算和频次记录"
    - "需求归类：每周复盘高频问题，判断是个案、内容选题还是可产品化需求"
    - "方案打样：用门店样板间、低库存 SKU、上门小单验证"
    - "产品化：把反复出现的需求变成套餐、好物清单、SOP 和会员权益"
  metrics:
    - "每周有效客户发言记录数"
    - "高频需求 TOP10"
    - "从发言到咨询的内容转化率"
    - "从咨询到方案成交率"
    - "复购/转介绍中由档案触发的订单占比"

# ── 投资人异议与标准话术 ──
investor_objection_playbook:
  source: "2026-07-01 用户与外部反馈者聊天记录"
  core_answer: >
    宅域不是先做 App 平台，而是先做实体信任锚点。
    门店负责让客户放心、体验商品、交付服务和沉淀案例；
    线上账号负责获客和放大；
    客户发言档案、SOP、方案库和商品库跑通后，平台化才有真实基础。
  extracted_objections:
    - question: "你是做实体店，还是打造平台？"
      answer: "先实体样板点，后运营平台化；不先做空平台。"
    - question: "为什么一定需要门店？"
      answer: "宠物接送、上门桌搭属于强信任服务，门店是安全感、可追责和体验转化的锚点。"
    - question: "视频不够好怎么办？"
      answer: "不赌泛流量爆款，做本地真实案例、流程记录、商品实测和社区互推。"
    - question: "客户为什么敢让你上门？"
      answer: "用到店登记、全程录像、服务前后拍照、临时密码流程和售后可追责降低顾虑。"
    - question: "服务利润低，怎么挣钱？"
      answer: "服务是引流和破冰，利润来自商品选品、套餐方案、上门改造、复购和转介绍。"
  proof_metrics:
    - "有效咨询数"
    - "到店体验数"
    - "接送洗护成交数"
    - "客户发言档案数量"
    - "商品附加率"
    - "复购/转介绍数"

