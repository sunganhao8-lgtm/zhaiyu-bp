# 宅域知识库 — 目录结构定义（单一事实源）
#
# 改这个文件 = 改整个目录结构
# 改完后跑：
#   python tools/render_index.py --write    # 更新 INDEX.md
#   python tools/render_structure.py --write # 更新 docs/structure.md
#   python tools/render_directory.py --write # 更新 DIRECTORY.md

root:
  purpose: 宅域宠物洗护店项目 — 知识库根目录
  audience: [ai, human, partner]
  read_when: 第一次接触项目 / 不确定某个东西在哪
  write_when: 改结构
  contains:

    # ── 📊 数据源（唯一事实源） ──
    - path: data/
      type: dir
      purpose: 唯一事实源 — 所有数字/决策的结构化存储
      audience: [ai]
      read_when: 需要确认某个数字、查找某条决策
      write_when: 任何数字/决议变化（必须第一个改这里）
      golden_rule: 改数据 → 跑 verify.py → 改文档 → 再跑 verify.py
      contains:
        - path: facts.yaml
          type: file
          purpose: 启动资金/成本/股份/服务定价等所有数字
          audience: [ai]
          read_when: AI 回答任何财务/数字问题前
          write_when: 财务模型调整
        - path: decisions.yaml
          type: file
          purpose: 28 条决策记录（含历史、已替换、生效）
          audience: [ai]
          read_when: 解释为什么这样设计 / 追溯决策时间线
          write_when: 任何新决议、修订、废弃
        - path: structure.yaml
          type: file
          purpose: 目录结构定义（就是本文件）
          audience: [ai]
          read_when: 改目录结构前
          write_when: 任何目录调整

    # ── 📝 会议笔记 ──
    - path: meetings/
      type: dir
      purpose: 会议笔记 — 每次会议的决议+冲突+待办结构化记录
      audience: [ai, human, partner]
      read_when: 了解一次会议的决定 / 找历史讨论
      write_when: 每次会议后立刻写一篇
      template: meetings/_template.md
      naming: YYYY-MM-DD-{会议主题}.md
      contains:
        - path: _template.md
          type: file
          purpose: 四段式会议笔记模板（强制冲突追踪）
          audience: [human]
        - path: 2026-06-26-创始人A快速会议.md
          type: file
          purpose: 第一次正式会议（启动资金/股份/分润机制敲定）
          audience: [ai, human, partner]

    # ── 📦 业务交付物 ──
    - path: bps/
      type: dir
      purpose: 业务交付物 — 给外人看的成品
      audience: [partner, investor, customer]
      read_when: 给投资人/合伙人/客户演示
      write_when: 演示材料更新
      caution: 这里面的数字必须和 data/facts.yaml 一致
      contains:
        - path: store-front/
          type: dir
          purpose: 门店商业计划书（bp.html/bp.md/布局编辑器/选址地图）
          contains:
            - path: bp.html
              type: file
              purpose: 商业计划书网页版（18页幻灯片）
              audience: [partner, investor]
            - path: bp.md
              type: file
              purpose: 商业计划书 Markdown 源文档（含财务明细）
              audience: [partner]
            - path: site-map.html
              type: file
              purpose: 选址分析地图（高德API + 11个真实POI）
              audience: [investor]
            - path: layout-editor.html
              type: file
              purpose: 49㎡ 门店布局编辑器（Konva.js + 碰撞检测）
              audience: [investor]
        - path: landing-for-coop/
          type: dir
          purpose: 合作着陆页（小红书引流/招合伙人）
          contains:
            - path: landing.html
              type: file
              purpose: 合作着陆页主入口
              audience: [partner, customer]
            - path: index.html
              type: file
              purpose: 合作着陆页重定向页

    # ── 📄 原始素材 ──
    - path: raw/
      type: dir
      purpose: 原始素材 — 元宝纪要/Excel/录屏，按原样归档
      audience: [human]
      read_when: 查证某个数字/引述/录屏内容
      write_when: 每次新会议/新素材
      caution: 大文件不入库（mp4/wemt*），只入引用 + 路径
      contains:
        - path: meetings/
          type: dir
          purpose: 各次会议的原始素材
          contains:
            - path: 2026-06-26/
              type: dir
              purpose: 2026-06-26 会议的原始素材
              contains:
                - path: 元宝纪要.txt
                  type: file
                  purpose: 元宝AI纪要全量文字（73KB）
                - path: 成本收益分析.xlsx
                  type: file
                  purpose: 会议填写的财务模型
                - path: README.md
                  type: file
                  purpose: 该素材包的说明 + 录屏位置指引

    # ── 🔧 工具 ──
    - path: tools/
      type: dir
      purpose: 一致性工具 — 保证知识库不自相矛盾
      audience: [ai]
      read_when: 改完任何文件后
      write_when: 新规则/新校验
      contains:
        - path: verify.py
          type: file
          purpose: 一致性校验（扫旧数字残留/不存在的DEC引用/未同步决议）
        - path: render_index.py
          type: file
          purpose: 自动生成 INDEX.md
        - path: render_structure.py
          type: file
          purpose: 自动生成 docs/structure.md（Mermaid图+表格）
        - path: render_directory.py
          type: file
          purpose: 自动生成 DIRECTORY.md（实景目录树+说明）

    # ── 🖼️ 共享资源 ──
    - path: assets/
      type: dir
      purpose: 共享资源（Logo、品牌素材）
      audience: [human]
      contains:
        - path: zhaiyu-logo.png
          type: file
          purpose: 宅域品牌 Logo

    # ── 🗄️ 归档 ──
    - path: archive/
      type: dir
      purpose: 旧版本/工作过程文件归档
      audience: [human]
      read_when: 想看当时怎么做的
      write_when: 任何旧文件需要归档时
      contains:
        - path: 2026-06-16/
          type: dir
          purpose: 立项当天的工作文件（inputs/outputs/review/work）

    # ── 🏛️ 文档入口（人类阅读） ──
    - path: README.md
      type: file
      purpose: 项目入口（这是什么/怎么用/为什么这样设计）
      audience: [human, partner]
      read_when: 第一次打开项目
      write_when: 入口/导航逻辑变化
    - path: INDEX.md
      type: file
      purpose: 自动生成的知识地图（不要手改）
      audience: [ai, human]
      generation: python tools/render_index.py --write
    - path: DECISIONS.md
      type: file
      purpose: 决策记录人类可读版（数据源在 data/decisions.yaml）
      audience: [ai, human, partner]
      read_when: 了解项目所有关键决策
    - path: DIRECTORY.md
      type: file
      purpose: 目录结构总览（自动生成，给合伙人看的）
      audience: [human, partner]
      generation: python tools/render_directory.py --write
    - path: docs/
      type: dir
      purpose: 项目说明与自动生成文档
      contains:
        - path: optimization-plan.md
          type: file
          purpose: 2026-07-01 全方位优化方案（客户档案/投资人话术/业务分层/电竞样板间/财务/股权/执行清单）
          audience: [human, partner]
        - path: investor-objection-playbook.md
          type: file
          purpose: 投资人异议话术库（实体店/平台/获客/信任/盈利标准回答）
          audience: [human, partner]
        - path: structure.md
          type: file
          purpose: 目录结构 Mermaid 可视化图（自动生成）
          audience: [human, partner]
          generation: python tools/render_structure.py --write

    # ── Git 规则 ──
    - path: .gitignore
      type: file
      purpose: 忽略规则（大文件/中间产物不入库）
